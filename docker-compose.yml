services:
   recipe-app:
      build:
         context: .
         dockerfile: Dockerfile
      ports:
         - '3000:3000'
      environment:
         - NODE_ENV=production
         - DATABASE_URL=file:/app/prisma/dev.db
         - JWT_SECRET=${JWT_SECRET}
         - SENDGRID_API_KEY=${SENDGRID_API_KEY}
         - EMAIL_FROM=${EMAIL_FROM}
         - PAGE_URL=http://localhost:3000
      volumes:
         # Persist SQLite database
         - recipe_db:/app/prisma
         # Persist uploaded images
         - recipe_uploads:/app/public/uploads
      restart: unless-stopped
      healthcheck:
         test:
            [
               'CMD',
               'wget',
               '--no-verbose',
               '--tries=1',
               '--spider',
               'http://localhost:3000/api/health',
            ]
         interval: 30s
         timeout: 10s
         retries: 3
         start_period: 40s

volumes:
   recipe_db:
      driver: local
   recipe_uploads:
      driver: local
